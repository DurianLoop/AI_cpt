<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目管理 - Linear 风格</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Linear Design System
           核心特征：
           - 颜色：深色背景 (#0d0d0d), 紫色强调 (#533afd)
           - 字体：Inter, 极致精简
           - 间距：8px 基础单位
           - 风格：极简、高对比度、精确
        */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0d0d0d;
            --bg-elevated: #1a1a1a;
            --bg-hover: #252525;
            --text: #e0e0e0;
            --text-secondary: #808080;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #533afd;
            --accent-hover: #6548ff;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .layout {
            display: grid;
            grid-template-columns: 220px 1fr;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            background: var(--bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 16px 12px;
        }

        .logo {
            font-size: 16px;
            font-weight: 600;
            padding: 8px 12px;
            margin-bottom: 24px;
        }

        .nav-item {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text);
        }

        .nav-item.active {
            background: var(--bg-elevated);
            color: var(--text);
        }

        .nav-section {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-secondary);
            padding: 8px 12px;
            margin-top: 24px;
            letter-spacing: 0.05em;
        }

        /* Main */
        .main {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            height: 56px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
        }

        .btn:hover {
            background: var(--bg-hover);
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 600;
        }

        .stat-change {
            font-size: 12px;
            color: #22c55e;
            margin-top: 4px;
        }

        /* Projects */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .project-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .project-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .project-name {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .project-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .project-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }

        .status-active {
            background: rgba(83, 58, 253, 0.15);
            color: var(--accent);
        }

        .status-planning {
            background: rgba(255, 187, 0, 0.15);
            color: #ffbb00;
        }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">ProjectHub</div>

            <nav>
                <div class="nav-item active">
                    <span>📊</span>
                    <span>仪表盘</span>
                </div>
                <div class="nav-item">
                    <span>📁</span>
                    <span>项目</span>
                </div>
                <div class="nav-item">
                    <span>✅</span>
                    <span>任务</span>
                </div>
                <div class="nav-item">
                    <span>👥</span>
                    <span>团队</span>
                </div>
            </nav>

            <div class="nav-section">工作区</div>
            <nav>
                <div class="nav-item">
                    <span>💼</span>
                    <span>设计团队</span>
                </div>
                <div class="nav-item">
                    <span>⚙️</span>
                    <span>开发团队</span>
                </div>
            </nav>
        </aside>

        <main class="main">
            <header class="header">
                <h1>仪表盘</h1>
                <div class="header-actions">
                    <button class="btn">筛选</button>
                    <button class="btn-primary btn">+ 新建项目</button>
                </div>
            </header>

            <div class="content">
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-label">总项目</div>
                        <div class="stat-value">24</div>
                        <div class="stat-change">↑ 12% 本月</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">进行中</div>
                        <div class="stat-value">8</div>
                        <div class="stat-change">↑ 3 新增</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">已完成</div>
                        <div class="stat-value">16</div>
                        <div class="stat-change">↑ 4 本周</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">团队成员</div>
                        <div class="stat-value">32</div>
                        <div class="stat-change">→ 无变化</div>
                    </div>
                </div>

                <div class="section-header">
                    <div class="section-title">活跃项目</div>
                    <button class="btn">查看全部</button>
                </div>

                <div class="projects-grid">
                    <div class="project-card">
                        <div class="project-header">
                            <div>
                                <div class="project-name">网站重设计</div>
                                <span class="status-badge status-active">进行中</span>
                            </div>
                        </div>
                        <div class="project-desc">重新设计公司官网，提升用户体验和转化率</div>
                        <div class="project-meta">
                            <span>📅 截止：6月20日</span>
                            <span>👥 5人</span>
                            <span>✅ 12/24</span>
                        </div>
                    </div>

                    <div class="project-card">
                        <div class="project-header">
                            <div>
                                <div class="project-name">移动应用开发</div>
                                <span class="status-badge status-active">进行中</span>
                            </div>
                        </div>
                        <div class="project-desc">iOS 和 Android 原生应用开发</div>
                        <div class="project-meta">
                            <span>📅 截止：7月15日</span>
                            <span>👥 8人</span>
                            <span>✅ 8/30</span>
                        </div>
                    </div>

                    <div class="project-card">
                        <div class="project-header">
                            <div>
                                <div class="project-name">API 集成</div>
                                <span class="status-badge status-planning">计划中</span>
                            </div>
                        </div>
                        <div class="project-desc">第三方服务 API 对接和文档编写</div>
                        <div class="project-meta">
                            <span>📅 截止：6月30日</span>
                            <span>👥 3人</span>
                            <span>✅ 2/15</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
