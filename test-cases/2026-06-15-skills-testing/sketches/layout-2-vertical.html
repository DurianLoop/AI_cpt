<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方案 2：垂直单列布局 - LearnHub</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .video-section {
            background: #000;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .video-player {
            width: 100%;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
        }

        .content {
            background: white;
        }

        .header {
            padding: 24px;
            border-bottom: 1px solid #e0e0e0;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 16px;
        }

        .instructor {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-section {
            padding: 20px 24px;
            background: #f8f8f8;
            border-bottom: 1px solid #e0e0e0;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .progress-bar {
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #0066ff;
            width: 45%;
        }

        .tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .tab {
            flex: 1;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            border-bottom-color: #0066ff;
            color: #0066ff;
            font-weight: 500;
        }

        .section {
            padding: 24px;
        }

        .chapter {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            background: #f8f8f8;
            cursor: pointer;
            transition: all 0.3s;
        }

        .chapter:hover {
            background: #e8e8e8;
        }

        .chapter.active {
            background: #e3f2ff;
            border-left: 4px solid #0066ff;
        }

        .chapter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .chapter-title {
            font-weight: 500;
        }

        .chapter-meta {
            font-size: 14px;
            color: #666;
        }

        .comment {
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .comment-author {
            font-weight: 500;
        }

        .comment-time {
            font-size: 14px;
            color: #666;
        }

        .recommended-course {
            display: flex;
            gap: 16px;
            padding: 16px;
            border-radius: 8px;
            background: #f8f8f8;
            margin-bottom: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .recommended-course:hover {
            background: #e8e8e8;
        }

        .course-thumb {
            width: 140px;
            height: 80px;
            background: #ddd;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .course-info h4 {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .course-info p {
            font-size: 14px;
            color: #666;
        }

        .fixed-bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e0e0e0;
            padding: 16px;
            display: flex;
            gap: 12px;
            max-width: 800px;
            margin: 0 auto;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #0066ff;
            color: white;
        }

        .btn-primary:hover {
            background: #0052cc;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <h2 style="max-width: 800px; margin: 0 auto; padding: 20px; color: #666;">方案 2：垂直单列布局（移动端优先）</h2>

    <div class="container">
        <div class="video-section">
            <div class="video-player">▶</div>
        </div>

        <div class="content">
            <div class="header">
                <h1>Python 全栈开发从入门到精通</h1>
                <div class="instructor">
                    <div class="avatar">👨‍💼</div>
                    <div>
                        <div style="font-weight: 500;">张明老师</div>
                        <div style="font-size: 14px; color: #666;">10年开发经验 · 5000+ 学员</div>
                    </div>
                </div>
            </div>

            <div class="progress-section">
                <div class="progress-label">
                    <span style="font-weight: 500;">学习进度</span>
                    <span style="color: #0066ff; font-weight: 600;">45%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <div style="font-size: 14px; color: #666; margin-top: 8px;">已完成 18/40 个章节</div>
            </div>

            <div class="tabs">
                <div class="tab active">大纲</div>
                <div class="tab">介绍</div>
                <div class="tab">评论</div>
                <div class="tab">推荐</div>
            </div>

            <div class="section">
                <div class="chapter active">
                    <div class="chapter-header">
                        <div class="chapter-title">第1章：Python 基础语法</div>
                        <div>✓</div>
                    </div>
                    <div class="chapter-meta">12 个视频 · 2小时30分 · 已完成</div>
                </div>

                <div class="chapter">
                    <div class="chapter-header">
                        <div class="chapter-title">第2章：面向对象编程</div>
                        <div>⏵</div>
                    </div>
                    <div class="chapter-meta">8 个视频 · 1小时45分</div>
                </div>

                <div class="chapter">
                    <div class="chapter-header">
                        <div class="chapter-title">第3章：Django 框架</div>
                        <div>⏵</div>
                    </div>
                    <div class="chapter-meta">15 个视频 · 3小时20分</div>
                </div>

                <div class="chapter">
                    <div class="chapter-header">
                        <div class="chapter-title">第4章：前端基础</div>
                        <div>⏵</div>
                    </div>
                    <div class="chapter-meta">10 个视频 · 2小时</div>
                </div>

                <div class="chapter">
                    <div class="chapter-header">
                        <div class="chapter-title">第5章：项目实战</div>
                        <div>🔒</div>
                    </div>
                    <div class="chapter-meta">20 个视频 · 5小时 · 需完成前置课程</div>
                </div>
            </div>
        </div>

        <div style="height: 80px;"></div>

        <div class="fixed-bottom-nav">
            <button class="btn btn-secondary">上一节</button>
            <button class="btn btn-primary">继续学习</button>
        </div>
    </div>
</body>
</html>
